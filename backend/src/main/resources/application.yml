server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ai-interview-coach-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/ai_interview_coach?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:1s}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

piston:
  base-url: ${PISTON_BASE_URL:http://localhost:2000/api/v2}
  api-key: ${PISTON_API_KEY:}
  java-version: ${PISTON_JAVA_VERSION:15.0.2}
  compile-timeout-ms: ${PISTON_COMPILE_TIMEOUT_MS:10000}
  run-timeout-ms: ${PISTON_RUN_TIMEOUT_MS:3000}

coach:
  cache:
    problem:
      enabled: ${PROBLEM_CACHE_ENABLED:true}
      list-ttl: ${PROBLEM_CACHE_LIST_TTL:10m}
      detail-ttl: ${PROBLEM_CACHE_DETAIL_TTL:30m}
      template-ttl: ${PROBLEM_CACHE_TEMPLATE_TTL:30m}
    knowledge:
      enabled: ${KNOWLEDGE_CACHE_ENABLED:true}
      category-ttl: ${KNOWLEDGE_CACHE_CATEGORY_TTL:30m}
      list-ttl: ${KNOWLEDGE_CACHE_LIST_TTL:30m}
      detail-ttl: ${KNOWLEDGE_CACHE_DETAIL_TTL:2h}
  rag:
    vector:
      enabled: ${RAG_VECTOR_ENABLED:false}
      collection-name: ${QDRANT_COLLECTION_NAME:ai_study_rag_chunks}
      host: ${QDRANT_HOST:localhost}
      port: ${QDRANT_PORT:6334}
      use-tls: ${QDRANT_USE_TLS:false}
      vector-size: ${RAG_VECTOR_SIZE:1536}
      hybrid-vector-weight: ${RAG_HYBRID_VECTOR_WEIGHT:0.60}
      hybrid-rule-weight: ${RAG_HYBRID_RULE_WEIGHT:0.40}
      vector-candidate-limit: ${RAG_VECTOR_CANDIDATE_LIMIT:30}
  auth:
    jwt-secret: ${AUTH_JWT_SECRET:dev-change-this-secret-for-deploy}
    jwt-expire-hours: ${AUTH_JWT_EXPIRE_HOURS:168}
  ai:
    base-url: ${AI_BASE_URL:https://api.anthropic.com}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:claude-3-5-sonnet-latest}
    max-tokens: ${AI_MAX_TOKENS:3000}
    anthropic-version: ${AI_ANTHROPIC_VERSION:2023-06-01}
    embedding:
      base-url: ${EMBEDDING_BASE_URL:https://api.openai.com}
      api-key: ${EMBEDDING_API_KEY:}
      model: ${EMBEDDING_MODEL:text-embedding-3-small}
      dimensions: ${EMBEDDING_DIMENSIONS:1536}
