server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ai-interview-coach-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/ai_interview_coach?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

piston:
  base-url: ${PISTON_BASE_URL:http://localhost:2000/api/v2}
  api-key: ${PISTON_API_KEY:}
  java-version: ${PISTON_JAVA_VERSION:15.0.2}
  compile-timeout-ms: ${PISTON_COMPILE_TIMEOUT_MS:10000}
  run-timeout-ms: ${PISTON_RUN_TIMEOUT_MS:3000}
